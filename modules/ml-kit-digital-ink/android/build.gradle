plugins {
  id 'com.android.library'
  id 'expo-module-gradle-plugin'
}

group = 'expo.modules.mlkitdigitalink'
version = '0.7.9'

android {
  namespace "expo.modules.mlkitdigitalink"
  defaultConfig {
    versionCode 1
    versionName "0.7.9"
  }
  lintOptions {
    abortOnError false
  }
}

dependencies {
  implementation 'com.google.mlkit:digital-ink-recognition:19.0.0'
}
