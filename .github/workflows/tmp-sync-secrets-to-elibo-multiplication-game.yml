name: tmp-sync-secrets-to-elibo-multiplication-game

on:
  workflow_dispatch:

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Sync selected repository secrets to target repo
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
          TARGET_REPO: elfiboewer/elibo-multiplication-game
          PORTAINER_API_KEY: ${{ secrets.PORTAINER_API_KEY }}
          PORTAINER_DEV_API_KEY: ${{ secrets.PORTAINER_DEV_API_KEY }}
          PORTAINER_DEV_ENDPOINT_ID: ${{ secrets.PORTAINER_DEV_ENDPOINT_ID }}
          PORTAINER_DEV_URL: ${{ secrets.PORTAINER_DEV_URL }}
          PORTAINER_ENDPOINT_ID: ${{ secrets.PORTAINER_ENDPOINT_ID }}
          PORTAINER_URL: ${{ secrets.PORTAINER_URL }}
        run: |
          set -euo pipefail

          names=(
            PORTAINER_API_KEY
            PORTAINER_DEV_API_KEY
            PORTAINER_DEV_ENDPOINT_ID
            PORTAINER_DEV_URL
            PORTAINER_ENDPOINT_ID
            PORTAINER_URL
          )

          for name in "${names[@]}"; do
            value="${!name:-}"
            if [ -z "$value" ]; then
              echo "::error::Secret '$name' is empty or missing in source repository"
              exit 1
            fi

            gh secret set "$name" \
              --repo "$TARGET_REPO" \
              --body "$value" \
              >/dev/null

            echo "synced $name"
          done

      - name: Verify target secret count (subset)
        env:
          GH_TOKEN: ${{ secrets.TARGET_REPO_PAT }}
        run: |
          set -euo pipefail
          gh secret list --repo elfiboewer/elibo-multiplication-game --limit 200 | grep -E 'PORTAINER_(DEV_)?(URL|API_KEY|ENDPOINT_ID)' || true
